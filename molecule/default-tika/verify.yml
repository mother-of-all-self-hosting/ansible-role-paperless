---
- name: Verify Paperless-ngx systemd service
  hosts: all
  become: true
  gather_facts: false
  tasks:
    - name: Wait for Paperless-ngx service to become active (up to 180s)
      ansible.builtin.systemd:
        name: paperless.service
      register: paperless_service
      until: paperless_service.status.ActiveState == 'active'
      retries: 36
      delay: 5

    - name: Assert Paperless-ngx service is active
      ansible.builtin.assert:
        that: paperless_service.status.ActiveState == 'active'
        fail_msg: "paperless.service not active ({{ paperless_service.status.ActiveState }})"
        success_msg: "paperless.service is active"

    - name: Retrieve Paperless-ngx service log for debugging
      when: paperless_debug_service_enabled | bool
      ansible.builtin.command:
        cmd: journalctl -xeu paperless.service
      changed_when: false

    - name: Wait for Paperless-ngx HTTP endpoint to respond (up to 10m)
      ansible.builtin.uri:
        url: "http://localhost:3000/"
        method: GET
        status_code: [200, 302]
        follow_redirects: none
      register: paperless_endpoint
      until: paperless_endpoint.status in [200, 302]
      retries: 120
      delay: 5

    - name: Assert Paperless-ngx HTTP endpoint responds
      ansible.builtin.assert:
        that: paperless_endpoint.status in [200, 302]
        fail_msg: "Paperless-ngx did not respond as expected ({{ paperless_endpoint.status | default('no response') }})"
        success_msg: "Paperless-ngx responded with {{ paperless_endpoint.status }}"

    - name: Show Paperless-ngx systemd service status summary
      ansible.builtin.debug:
        msg:
          - "Paperless-ngx systemd: {{ paperless_service.status.ActiveState }}"
          - "Paperless-ngx HTTP: {{ paperless_endpoint.status }}"
