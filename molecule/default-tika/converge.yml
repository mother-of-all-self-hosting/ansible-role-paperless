---
- name: Include roles for Paperless-ngx Molecule tests
  hosts: all
  become: true
  gather_facts: true
  tasks:
    - name: Include roles for Paperless-ngx Molecule tests
      ansible.builtin.include_role:
        name: "{{ role_name }}"
        public: true
      loop:
        - com.devture.ansible.role.playbook_help
        - com.devture.ansible.role.systemd_docker_base
        - ansible-role-gotenberg
        - ansible-role-tika
        - ansible-role-valkey
        - "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') | basename }}"
      loop_control:
        loop_var: role_name

- name: Ensure Paperless-ngx service is started
  hosts: all
  become: true
  gather_facts: false
  tasks:
    - name: Ensure systemd daemon is reloaded
      ansible.builtin.systemd_service:
        daemon_reload: true

    - name: Ensure Gotenberg systemd service is started
      ansible.builtin.systemd_service:
        name: gotenberg.service
        state: started

    - name: Ensure Apache Tika Server systemd service is started
      ansible.builtin.systemd_service:
        name: tika.service
        state: started

    - name: Ensure Valkey systemd service is started
      ansible.builtin.systemd_service:
        name: valkey.service
        state: started

    - name: Ensure Paperless-ngx systemd service is started
      ansible.builtin.systemd_service:
        name: paperless.service
        state: started
